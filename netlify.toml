[build]
  command = "npm install && npx prisma generate"
  functions = "netlify/functions"
  publish = "public"

[build.environment]
  NODE_VERSION = "20"
  NODE_ENV = "production"

[functions]
  node_bundler = "nft"
  included_files = ["src/generated/**"]

[[redirects]]
  from = "/*"
  to = "/.netlify/functions/api"
  status = 200
  force = true
